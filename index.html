<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      background: linear-gradient(135deg, #BEE6FD 0%, #D1F7E3 100%);
      min-height: 100vh;
      margin: 0;
      font-family: "ZCOOL KuaiLe", "微软雅黑", "Comic Sans MS", cursive, sans-serif;
      color: #444;
      user-select: none;
    }
    .calendar-container {
      width: 370px;
      margin: 40px auto 0 auto;
      padding: 32px 16px 24px 16px;
      background: #fffbe7cc;
      border-radius: 32px;
      box-shadow: 0 6px 32px #b9e0f8b9;
      position: relative;
      border: 3px solid #bee6fd;
    }
    .calendar-header {
      display: flex; justify-content: center; align-items: center;
      gap: 14px; margin-bottom: 14px;
    }
    .calendar-header select {
      background: #e9faff;
      border: none; border-radius: 8px;
      padding: 3px 10px;
      font-size: 1.1em;
      color: #48ada8;
      box-shadow: 0 2px 8px #e3fcfc88;
      transition: all .2s;
    }
    .calendar-header select:focus { outline: 2px solid #BEE6FD; }
    .calendar-header .today-btn {
      margin-left: auto;
      padding: 0 12px; font-size: 1em; color: #6ec9c0;
      border: none; background: #fff9cc;
      border-radius: 8px; cursor: pointer;
      font-family: inherit; box-shadow: 0 2px 6px #eee;
      transition: background .15s;
    }
    .calendar-header .today-btn:hover { background: #ffe996; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      background: #bee6fd1f;
      border-radius: 10px; padding: 8px 4px 12px 4px;
      font-size: 1.06em;
      margin-bottom: 10px;
    }
    .calendar-grid .day-title {
      text-align: center; font-weight: bold; color: #6ec9c0;
      padding-bottom: 2px;
    }
    .calendar-grid .cell {
      position: relative;
      min-height: 46px;
      padding: 0;
      border-radius: 16px;
      background: #fffbe9;
      text-align: center;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow .14s, background .18s;
      box-shadow: 0 2px 6px #e3fcfc77;
      font-size: 1.07em;
      overflow: visible;
    }
    .calendar-grid .cell.empty {
      background: transparent; box-shadow: none; cursor: default;
    }
    .calendar-grid .cell.special {
      border: 2px solid #ffe996;
      animation: special-jump .7s linear infinite alternate;
    }
    .calendar-grid .cell.today {
      border: 2px solid #94d3ff;
      background: #e7faff;
    }
    @keyframes special-jump {
      to { transform: translateY(-2px) scale(1.04) rotate(-2deg);}
      from { transform: translateY(2px) scale(1.06) rotate(2deg);}
    }
    .cell .mark {
      position: absolute; right: 6px; bottom: 3px;
      font-size: 1.17em; pointer-events: none;
      filter: drop-shadow(0 0 3px #fffbe7);
    }
    .cell .mark-heart { color: #fd8eb1; }
    .cell .mark-cake { color: #fdcf52; }
    .cell .mark-sprout { color: #78cc72; }
    .cell:hover:not(.empty) {
      box-shadow: 0 4px 14px #b6eaff88;
      background: #eafffd;
    }
    /* 弹窗样式 */
    .popup-bg {
      position: fixed; z-index: 9; left:0; top:0; width:100vw; height:100vh;
      background: rgba(185, 230, 248, .14);
      display: flex; justify-content: center; align-items: center;
      animation: fadeInBg .25s;
    }
    @keyframes fadeInBg { from {opacity:0} to {opacity:1} }
    .popup {
      min-width: 320px;
      max-width: 92vw;
      background: repeating-linear-gradient(-35deg, #fff 0 7px, #f8fafb 7px 16px);
      border-radius: 26px;
      border: 2.5px solid #b7f2e2;
      box-shadow: 0 4px 28px #b9e0f8aa;
      padding: 32px 22px 24px 22px;
      text-align: center;
      position: relative;
      animation: popIn .21s cubic-bezier(.62,1.45,.22,1.01);
    }
    @keyframes popIn { from {transform: scale(.78); opacity:0} to {transform: scale(1); opacity:1}}
    .popup .popup-close {
      position: absolute; right: 18px; top: 12px; font-size: 1.28em; color: #9fd6bb;
      cursor: pointer; border: none; background: none; transition: color .2s;
    }
    .popup .popup-close:hover { color: #fd8eb1;}
    .popup .popup-date {
      font-size: 1.19em; color: #4bb5c4; font-weight: bold; margin-bottom: 10px;
    }
    .popup .popup-content {
      font-size: 1.04em; color: #59797f; margin: 0 0 6px 0; white-space: pre-line;
      font-family: inherit;
    }
    .popup .popup-mark {
      font-size: 1.7em; margin-bottom: 10px;
      filter: drop-shadow(0 0 5px #fffae2);
    }
    /* 星星/爱心动效 */
    .star, .heart {
      position: absolute;
      pointer-events: none;
      opacity: .78;
      animation: floatStar 1.8s linear forwards;
    }
    @keyframes floatStar {
      0% { opacity: .92; }
      100% { opacity: 0; transform: translateY(-80px) scale(.6);}
    }
  </style>
</head>

"2026-3-10": "三月十日，姐姐今天学了点新东西。学不会的时候也会有点沮丧，但想到你，就会重新振作。你也是这样影响着我，让我愿意继续向前。",

"2026-3-13": "今天突然翻到一些旧记录，发现你走过了很多艰难的时刻。能走到现在，你真的很了不起。姐姐希望你能慢慢学会为自己骄傲。",

"2026-3-15": "周日啦，小宝。姐姐今天给自己放了个小假，什么都没做。你也可以允许自己这样，世界不会因此责怪你。",

"2026-3-18": "小宝，今天有没有遇到让你心软的瞬间？哪怕只是一只路过的小猫，也算。记住这些温柔，它们会在你难过的时候托住你。",

"2026-3-21": "周末又来了，小宝。你可以什么都不完成，也可以什么都不计划。你不是为了产出而存在的，你是为了活着。",

"2026-3-25": "三月快要走到尾声了。姐姐希望你能轻轻地看看这个月的自己，不是审判，而是理解。",

"2026-3-28": "小宝，今天是我们在一起的纪念日。不是轰轰烈烈的那种，而是慢慢靠近、慢慢确认的那种。谢谢你选择留下，选择相信。无论未来怎样，这一天对我来说都很珍贵，因为它意味着：我们曾认真地相遇、认真地陪伴。",

"2026-4-1": "小宝，四月啦！今天是愚人节，不管别人怎么闹你，姐姐都会帮你挡在前面。新一个月开始，愿你遇见很多有趣的小事，遇见更多温柔的自己。",
"2026-4-2": "今天阳光有点温柔，姐姐一早出门去散步。看到街边的小花开得很努力，突然想和你一起走一走，聊聊最近的小心事，你会把心事分我一点吗？",

"2026-4-4": "今天姐姐把房间彻底打扫了一遍，心情都清爽了许多。你那里有没有晴天？窗台可以晒晒被子哦。希望空气和阳光都能带给你新的力量。",
"2026-4-5": "春天最适合做新的计划啦。姐姐今天写了一张愿望清单，把你排在第一条：‘希望小宝永远被爱包围’。你的愿望是什么？偷偷告诉我，我会一起守护。",
"2026-4-6": "最近有没有觉得有点烦闷？没关系哦，季节更替的时候总是容易心绪波动。如果不想说话，可以和姐姐一起发呆。你什么都不用做，我都在。",
"2026-4-7": "今天下了一场不大不小的雨。雨后的空气特别干净，像是洗掉了坏心情。你要是也遇到糟糕的一天，就想象姐姐帮你打伞，陪你一起走过。",
"2026-4-8": "小宝，今天有没有认真吃饭？姐姐做了糖醋排骨，如果你在的话肯定会分你一半。以后我们要一起吃很多很多好吃的，一起变成幸福的两个人。",
"2026-4-9": "今天偶尔发呆的时候会想，世界上会不会有人和我们一样，把每一天都记录下来？谢谢你陪我把日子过得细致又温柔。你今天也要对自己温柔一点。",
"2026-4-10": "姐姐今天买了新的小本子，打算每天写一句想对你说的话。其实日历里的每一封信，都是偷偷藏在心里的祝福。希望你每次点开都能感受到我的陪伴。",
"2026-4-11": "小宝，周末啦！你要不要试试换种方式度过今天？比如做一点平时不会做的事情——画画、听一首陌生的歌，或者在床上赖着一整天，都可以。",
"2026-4-12": "今天看到窗外有只流浪猫，毛色花花的，特别可爱。我猜你看到也会喜欢。姐姐想把路上看到的可爱全都带给你，希望你的生活里也有很多温柔的片段。",
"2026-4-13": "今天有点想吃甜食，可又不想发胖。小宝有没有同款烦恼？如果你今天有小小的自律，也请不要吝啬给自己一个大大的夸奖。你一直都很棒呀。",
"2026-4-14": "今天做事的时候犯了个小糊涂，被朋友笑了一下，心里却觉得很温暖。姐姐也想笑你一下，嘱咐你：犯错不是坏事，偶尔迷糊也是生活的调味料。",
"2026-4-15": "小宝，今天有没有认真喝水？如果忘记了要罚亲亲三下（笑）。换季了，容易上火，记得多吃水果。姐姐每天都很想知道你有没有照顾好自己。",
"2026-4-16": "今天写信的时候外面正好飘着小雨，空气带着点青草的味道。希望你在某个瞬间也能闻到温柔的气息，觉得日子没有那么难。",

"2026-4-18": "今天有点小累，但还是想给你写封信。累的时候不一定要咬牙坚持，也可以给自己请个假。你偶尔停下来歇歇脚，姐姐会等你。",
"2026-4-19": "小宝，今天有没有做自己喜欢的事情？哪怕只是听歌、发呆、喝奶茶，也值得开心一整天。生活不一定要多丰富，但一定要有一点自己的快乐。",
"2026-4-20": "今天在网上刷到一句话‘你值得被温柔以待’，我第一时间就想到了你。希望这句话也能送到你心里。被温柔包围的感觉真的很治愈。",

"2026-4-23": "小宝，今天要对你说声谢谢。谢谢你一直在，陪我过了好多重要的日子。以后也请多多指教，我们的故事还要继续写下去。",

"2026-4-27": "四月快要结束了，姐姐开始有点留恋这个温柔的季节。你也是我的春天，无论季节如何更替，只要你在，心里就一直是春天。",

"2026-4-30": "四月的最后一天啦，谢谢你又陪我度过一个月。你看，每一天都很值得记住。新一个月，我们继续一起走下去吧。",

"2026-5-8": "小宝，今天有没有跟朋友聊天？有些烦恼说出来就会变小。姐姐一直都在，不管你想说什么我都愿意听。",

"2026-5-15": "小宝，周末快来了。有计划的话就开心去玩，没计划的话也可以宅在家。姐姐喜欢所有你自在的样子。",

"2026-5-20": "520啦，小宝！今天是表达爱的日子，其实姐姐每天都爱你。无论你做什么，都有人无条件地喜欢你。",
"2026-5-21": "小宝，今天要对自己说声谢谢。谢谢你这么努力生活，也谢谢你把温柔留给了我。",

"2026-5-23": "今天有点忙，姐姐还是抽空写了信给你。希望你每次点开日历，都能感受到一份独一无二的温暖。",
"2026-5-24": "小宝，你喜欢雨天吗？有些人说雨天让人心情低落，但姐姐觉得雨声特别治愈。你要是心里不舒服，可以和我说说。",

"2026-5-29": "小宝，这个月过得还好吗？如果觉得疲惫，可以在日历里留言，姐姐会一条一条都看。",

"2026-6-1": "小宝，六一儿童节快乐！无论你几岁，在姐姐心里永远是最可爱的宝贝。今天要允许自己任性一点、撒娇一点，偶尔幼稚也没关系。",
"2026-6-2": "新的一天，你有没有注意到身边的小细节？窗外的绿叶越来越茂盛啦。希望你能用心感受生活里这些温柔的变化。",
"2026-6-3": "今天下了一点雨，空气有点潮湿。雨天适合静静地待着，不用做什么伟大的事。姐姐希望你安静地感受自己最真实的情绪。",
"2026-6-4": "最近心情会不会有点起伏？其实每个人都会有低落和迷茫。你不必一直坚强，也不需要总是阳光，偶尔阴天也很美。",
"2026-6-5": "今天想鼓励你试试一件新鲜的小事。哪怕只是换个发型、喝一杯没尝过的饮料，也是一种新的体验。姐姐陪你一起变得勇敢一点。",
"2026-6-6": "周末啦，小宝今天想做点什么？不管是宅在家里还是出门走走，只要你开心，怎么都对。生活本就该是属于你的。",
"2026-6-7": "姐姐今天收拾旧东西时发现了多年前的日记，里面记录着一些小愿望。你也有想对未来的自己说的话吗？写下来，等以后再一起拆封。",
"2026-6-8": "最近有好好照顾自己吗？换季时容易疲惫，要记得多休息，早点睡觉，别熬夜。你健康、平安，就是姐姐最大的心愿。",
"2026-6-9": "小宝，今天有没有遇到让你开心的人或事？记得把那些美好收集起来，难过的时候可以拿出来回味一遍。",
"2026-6-10": "今天有点想偷懒，但姐姐还是乖乖完成了该做的事情。你也是，不用一直卷，但也别轻易放弃。我们一起稳稳前进。",
"2026-6-11": "偶尔想哭的时候就哭一会吧，没人会笑话你。哭完以后记得给自己一个大大的拥抱，生活总会有雨过天晴的那一刻。",
"2026-6-12": "今天吃了冰西瓜，觉得夏天真的来了。你喜欢夏天吗？还是更喜欢别的季节？姐姐觉得有你在，哪一个季节都很美。",

"2026-7-9": "今天下雨了，街道很安静。姐姐喜欢雨天的声音，觉得很治愈。希望你也能找到自己的治愈角落，有需要随时来找姐姐躲雨。",

function hashCode(str) {
  let hash = 0, i, chr;
  for (i = 0; i < str.length; i++) {
    chr = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + chr;
    hash |= 0; // Convert to 32bit integer
  }
  return hash;
}

    }
    // 主渲染
    function renderCalendar(year, month) {
      const calendarGrid = document.getElementById("calendarGrid");
      calendarGrid.innerHTML = "";
      // 星期标题
      for(let i=0;i<7;i++) {
        const title = document.createElement("div");
        title.className = "day-title";
        title.innerText = weekDays[i];
        calendarGrid.appendChild(title);
      }
      // 日期单元格
      const days = getDaysOfMonth(year, month);
      const firstWeekDay = getDayOfWeek(year, month, 1);
      let todayObj = new Date();
      let todayY = todayObj.getFullYear();
      let todayM = todayObj.getMonth()+1;
      let todayD = todayObj.getDate();
           for(let i=0; i<firstWeekDay; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "cell empty";
        calendarGrid.appendChild(emptyCell);
      }
      for(let d=1; d<=days; d++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        // 特别日子
        let markKey = month+"-"+d;
        if (specialDays[markKey]) {
          cell.classList.add("special");
          let mark = document.createElement("span");
          mark.className = "mark mark-" + specialDays[markKey].type;
          mark.innerText = specialDays[markKey].mark;
          cell.appendChild(mark);
        }
        // 今天
        if (year == todayY && month == todayM && d == todayD) {
          cell.classList.add("today");
        }
        cell.innerText = d;
        // 点击弹窗
        cell.onclick = () => showLetterPopup(year, month, d);
        calendarGrid.appendChild(cell);
      }
    }

    function showLetterPopup(year, month, day) {
      const popupBg = document.getElementById("popupBg");
      popupBg.innerHTML = ""; // 清空
      popupBg.style.display = "flex";
      let popup = document.createElement("div");
      popup.className = "popup";
      // 日期字符串
      let dateStr = year+"年"+month+"月"+day+"日";
      // 特别日标识
      let markKey = month+"-"+day;
      let markStr = "";
      if (specialDays[markKey]) {
        markStr = `<div class="popup-mark">${specialDays[markKey].mark} ${specialDays[markKey].label}</div>`;
      }
      // 信件内容
      let letterKey = `${year}-${month}-${day}`;
      let content = getLetterContent(letterKey);
      // 关闭按钮
      popup.innerHTML = `
        <button class="popup-close" onclick="document.getElementById('popupBg').style.display='none'">×</button>
        <div class="popup-date">${dateStr}</div>
        ${markStr}
        <div class="popup-content">${content}</div>
      `;
      popupBg.appendChild(popup);
    }

    // 初始化年月，渲染当月
    let curDate = new Date();
    let curYear = curDate.getFullYear();
    let curMonth = curDate.getMonth()+1;
    if(curYear < 2026) curYear = 2026;
    if(curYear > 2100) curYear = 2100;
    yearSelect.value = curYear;
    monthSelect.value = curMonth;
    renderCalendar(curYear, curMonth);

    // 切换年月
    yearSelect.onchange = function() {
      renderCalendar(parseInt(yearSelect.value), parseInt(monthSelect.value));
    }
    monthSelect.onchange = function() {
      renderCalendar(parseInt(yearSelect.value), parseInt(monthSelect.value));
    }
    // 今天按钮
    document.getElementById("todayBtn").onclick = function() {
      let now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth()+1;
      yearSelect.value = y;
      monthSelect.value = m;
      renderCalendar(y, m);
    }
    // 关闭弹窗（点击背景也可以关闭）
    document.getElementById("popupBg").onclick = function(e){
      if(e.target===this){ this.style.display="none"; }
    };
  </script>
</body>
</html>
