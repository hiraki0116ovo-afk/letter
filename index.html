<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>小宝与姐姐的信纸日历 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body {
      background: linear-gradient(135deg, #BEE6FD 0%, #D1F7E3 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Nunito', 'Varela Round', 'Segoe UI Rounded', '幼圆', 'Comic Sans MS', sans-serif;
      color: #444;
      user-select: none;
    }

    .calendar-container {
      width: 370px;
      margin: 40px auto 0 auto;
      padding: 32px 16px 24px 16px;
      background: #fffbe7cc;
      border-radius: 32px;
      box-shadow: 0 6px 32px #b9e0f8b9;
      position: relative;
      border: 3px solid #bee6fd;
    }

    .calendar-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .calendar-header select {
      background: #e9faff;
      border: none;
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 1.1em;
      color: #48ada8;
      box-shadow: 0 2px 8px #e3fcfc88;
      transition: all .2s;
    }

    .calendar-header select:focus {
      outline: 2px solid #BEE6FD;
    }

    .calendar-header .today-btn {
      margin-left: auto;
      padding: 0 12px;
      font-size: 1em;
      color: #6ec9c0;
      border: none;
      background: #fff9cc;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 6px #eee;
      transition: background .15s;
    }

    .calendar-header .today-btn:hover {
      background: #ffe996;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      background: #bee6fd1f;
      border-radius: 10px;
      padding: 8px 4px 12px 4px;
      font-size: 1.06em;
      margin-bottom: 10px;
    }

    .calendar-grid .day-title {
      text-align: center;
      font-weight: bold;
      color: #6ec9c0;
      padding-bottom: 2px;
    }

    .calendar-grid .cell {
      position: relative;
      min-height: 46px;
      padding: 0;
      border-radius: 16px;
      background: #fffbe9;
      text-align: center;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow .14s, background .18s;
      box-shadow: 0 2px 6px #e3fcfc77;
      font-size: 1.07em;
      overflow: visible;
    }

    .calendar-grid .cell.empty {
      background: transparent;
      box-shadow: none;
      cursor: default;
    }

    .calendar-grid .cell.special {
      border: 2px solid #ffe996;
      animation: special-jump .7s linear infinite alternate;
    }

    .calendar-grid .cell.today {
      border: 2px solid #94d3ff;
      background: #e7faff;
    }

    @keyframes special-jump {
      to {
        transform: translateY(-2px) scale(1.04) rotate(-2deg);
      }

      from {
        transform: translateY(2px) scale(1.06) rotate(2deg);
      }
    }

    .cell .mark {
      position: absolute;
      right: 6px;
      bottom: 3px;
      font-size: 1.17em;
      pointer-events: none;
      filter: drop-shadow(0 0 3px #fffbe7);
    }

    .cell .mark-heart {
      color: #fd8eb1;
    }

    .cell .mark-cake {
      color: #fdcf52;
    }

    .cell .mark-sprout {
      color: #78cc72;
    }

    .cell:hover:not(.empty) {
      box-shadow: 0 4px 14px #b6eaff88;
      background: #eafffd;
    }

    /* 弹窗样式 */
    .popup-bg {
      position: fixed;
      z-index: 9;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(185, 230, 248, .14);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeInBg .25s;
    }

    @keyframes fadeInBg {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .popup {
      min-width: 320px;
      max-width: 92vw;
      background: repeating-linear-gradient(-35deg, #fff 0 7px, #f8fafb 7px 16px);
      border-radius: 26px;
      border: 2.5px solid #b7f2e2;
      box-shadow: 0 4px 28px #b9e0f8aa;
      padding: 32px 22px 24px 22px;
      text-align: center;
      position: relative;
      animation: popIn .21s cubic-bezier(.62, 1.45, .22, 1.01);
    }

    @keyframes popIn {
      from {
        transform: scale(.78);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .popup .popup-close {
      position: absolute;
      right: 18px;
      top: 12px;
      font-size: 1.28em;
      color: #9fd6bb;
      cursor: pointer;
      border: none;
      background: none;
      transition: color .2s;
    }

    .popup .popup-close:hover {
      color: #fd8eb1;
    }

    .popup .popup-date {
      font-size: 1.19em;
      color: #4bb5c4;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .popup .popup-content {
      font-size: 1.04em;
      color: #59797f;
      margin: 0 0 6px 0;
      white-space: pre-line;
      font-family: inherit;
    }

    .popup .popup-mark {
      font-size: 1.7em;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 5px #fffae2);
    }

    /* 星星/爱心动效 */
    .star,
    .heart {
      position: absolute;
      pointer-events: none;
      opacity: .78;
      animation: floatStar 1.8s linear forwards;
    }

    @keyframes floatStar {
      0% {
        opacity: .92;
      }

      100% {
        opacity: 0;
        transform: translateY(-80px) scale(.6);
      }
    }

    /* --- 芥末泥的新增样式：底部导航与信箱 --- */
    body { padding-bottom: 80px; } /* 给底部导航栏留出空间 */
    
    .view-section { display: none; animation: fadeIn .3s ease; }
    .view-section.active { display: block; }

    /* 底部导航栏 */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: #fffdf5; border-top: 2px solid #bee6fd;
      display: flex; justify-content: space-around; padding: 10px 0;
      box-shadow: 0 -2px 15px rgba(185, 230, 248, 0.4); z-index: 100;
    }
    .nav-btn {
      background: none; border: none; font-size: 1.2em; font-family: inherit;
      color: #9fd6bb; cursor: pointer; padding: 8px 20px; border-radius: 20px;
      transition: all .2s;
    }
    .nav-btn.active { background: #bee6fd; color: #444; font-weight: bold; }

    /* 信箱板块样式 */
    .letters-container {
      width: 370px; margin: 20px auto; padding: 20px 16px;
      background: #fffbe7cc; border-radius: 32px;
      box-shadow: 0 6px 32px #b9e0f8b9; border: 3px solid #bee6fd;
    }
    .letter-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .letter-form input, .letter-form textarea {
      font-family: inherit; font-size: 1em; padding: 10px;
      border: 2px solid #b7f2e2; border-radius: 12px; background: #fff;
      outline: none; transition: border .2s;
    }
    .letter-form input:focus, .letter-form textarea:focus { border-color: #fd8eb1; }
    .letter-form textarea { resize: vertical; min-height: 100px; }
    .save-btn {
      background: #fd8eb1; color: white; border: none; padding: 10px;
      border-radius: 12px; font-size: 1.1em; cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 10px rgba(253, 142, 177, 0.3); transition: transform .1s;
    }
    .save-btn:active { transform: scale(0.96); }

   /* --- 🌟 芥末泥特制：信件堆叠与抽出动画 --- */
    #savedLettersList {
      display: flex;
      flex-direction: column;
      padding-top: 10px;
    }
    
    .letter-card {
      background: #fff;
      border: 2px solid #ffe4ee; 
      border-radius: 20px; 
      padding: 16px 20px;
      margin-top: 15px; 
      position: relative; 
      box-shadow: 0 4px 12px rgba(253, 142, 177, 0.1);
      /* 核心动画：让边距、缩放、阴影都带上 Q弹 的过渡效果 */
      transition: margin 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  border-color 0.4s, box-shadow 0.4s;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    /* 📦 叠放状态 (待在盒子里) */
    .letter-card.stacked {
      cursor: pointer;
      background: #fffbfd;
      transform: scale(0.96); /* 稍微缩小一点，显得在底层 */
      z-index: 1;
    }
    
    /* 核心魔法：让叠放的信件互相遮盖，只露出顶部的日期！ */
    .letter-card.stacked + .letter-card.stacked {
      margin-top: -30px; 
    }

    /* 鼠标悬停在叠放信件上时，微微抽出提示小琪可以点击 */
    .letter-card.stacked:hover {
      transform: scale(0.98) translateY(-8px);
      box-shadow: 0 8px 20px rgba(253, 142, 177, 0.2);
      z-index: 10;
    }

    /* 💌 抽出平铺状态 (正在阅读) */
    .letter-card.expanded {
      margin-top: 25px; /* 抽出时，把上下相邻的信件推开 */
      margin-bottom: 25px;
      transform: scale(1) translateY(0);
      border-color: #fd8eb1;
      background: #fff;
      z-index: 20;
      box-shadow: 0 10px 25px rgba(253, 142, 177, 0.25);
    }

    /* 卡片头部：永远显示 (日期和删除按钮) */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-date { font-size: 1.05em; color: #fd8eb1; font-weight: bold; }
    .delete-btn { 
      background: none; border: none; color: #ddd; font-size: 1.5em; 
      cursor: pointer; transition: color .2s; padding: 0; line-height: 1;
    }
    .delete-btn:hover { color: #fd8eb1; }

    /* 卡片内容区：利用 CSS Grid 实现丝滑展开与折叠 */
    .card-content-wrapper {
      display: grid;
      grid-template-rows: 0fr; /* 默认把正文折叠隐藏 */
      transition: grid-template-rows 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .letter-card.expanded .card-content-wrapper {
      grid-template-rows: 1fr; /* 被点击时，丝滑拉平展开正文 */
    }
    .card-content {
      overflow: hidden;
      padding-top: 0;
      transition: padding 0.5s;
    }
    .letter-card.expanded .card-content {
      padding-top: 15px; /* 展开后加上内边距 */
    }

    .card-sender { font-weight: bold; color: #fd8eb1; margin-bottom: 8px; font-size: 1.05em; }
    .card-body { color: #666; white-space: pre-wrap; font-size: 1.05em; line-height: 1.6; margin-bottom: 12px; background: #fff9fb; padding: 12px; border-radius: 12px;}
    .card-recipient { text-align: right; font-weight: bold; color: #8ad3e0; }
    /* 到这 */


    /* --- 芥末泥新增：投递动画与回忆匣样式 --- */
    .animation-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(185, 230, 248, 0.7); z-index: 999;
      display: none; justify-content: center; align-items: center; flex-direction: column;
    }
    .mailbox-icon { font-size: 6em; margin-top: 50px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
    .envelope-icon {
      font-size: 4em; position: absolute; top: 20%;
      /* 核心动画：信封缩小并掉进信箱 */
      animation: dropIn 1.5s forwards cubic-bezier(0.5, 0, 0.5, 1);
    }
    @keyframes dropIn {
      0% { transform: translateY(-50px) scale(1); opacity: 0; }
      20% { transform: translateY(0px) scale(1.1) rotate(-5deg); opacity: 1; }
      60% { transform: translateY(70px) scale(0.6) rotate(5deg); opacity: 1; }
      100% { transform: translateY(120px) scale(0); opacity: 0; }
    }
    .anim-text { 
      color: #59797f; font-weight: bold; margin-top: 15px; font-size: 1.2em; 
      background: #fff; padding: 6px 18px; border-radius: 20px; 
      box-shadow: 0 4px 10px rgba(185,230,248,0.5);
    }
    /* 新增动效到这 */


    /* --- 芥末泥新增：回忆匣搜索与筛选栏样式 --- */
    .search-filter-bar {
      display: flex; gap: 8px; margin-bottom: 15px; align-items: center;
    }
    .search-input-wrapper {
      position: relative; flex: 1;
    }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      font-size: 1.1em; color: #9fd6bb; pointer-events: none;
    }
    #searchKeyword {
      width: 100%; box-sizing: border-box; padding: 8px 10px 8px 34px; /* 留出放大镜的位置 */
      border: 2px solid #b7f2e2; border-radius: 12px; font-family: inherit; 
      outline: none; transition: border .2s; font-size: 0.95em;
    }
    #searchKeyword:focus { border-color: #fd8eb1; }
    #searchDate {
      padding: 7px; border: 2px solid #b7f2e2; border-radius: 12px; 
      font-family: inherit; outline: none; font-size: 0.9em; color: #59797f;
    }
    .clear-btn {
      background: #fff9cc; color: #6ec9c0; border: none; padding: 8px 12px; 
      border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 0.9em; 
      box-shadow: 0 2px 6px #eee; transition: background .2s; white-space: nowrap;
    }
    .clear-btn:hover { background: #ffe996; }
    /* 搜索功能到这 */
  </style>
</head>

    function hashCode(str) {
      let hash = 0, i, chr;
      for (i = 0; i < str.length; i++) {
        chr = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + chr;
        hash |= 0; // Convert to 32bit integer
      }
      return hash;
    }

      for (let d = 1; d <= days; d++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        // 特别日子
        let markKey = month + "-" + d;
        if (specialDays[markKey]) {
          cell.classList.add("special");
          let mark = document.createElement("span");
          mark.className = "mark mark-" + specialDays[markKey].type;
          mark.innerText = specialDays[markKey].mark;
          cell.appendChild(mark);
        }
        // 今天
        if (year == todayY && month == todayM && d == todayD) {
          cell.classList.add("today");
        }
        cell.innerText = d;
        // 点击弹窗
        cell.onclick = () => showLetterPopup(year, month, d);
        calendarGrid.appendChild(cell);
      }
    }

    function showLetterPopup(year, month, day) {
      const popupBg = document.getElementById("popupBg");
      popupBg.innerHTML = ""; // 清空
      popupBg.style.display = "flex";
      let popup = document.createElement("div");
      popup.className = "popup";
      // 日期字符串
      let dateStr = year + "年" + month + "月" + day + "日";
      // 特别日标识
      let markKey = month + "-" + day;
      let markStr = "";
      if (specialDays[markKey]) {
        markStr = `<div class="popup-mark">${specialDays[markKey].mark} ${specialDays[markKey].label}</div>`;
      }
      // 信件内容
      let letterKey = `${year}-${month}-${day}`;
      let content = getLetterContent(letterKey);
      // 关闭按钮
      popup.innerHTML = `
        <button class="popup-close" onclick="document.getElementById('popupBg').style.display='none'">×</button>
        <div class="popup-date">${dateStr}</div>
        ${markStr}
        <div class="popup-content">${content}</div>
      `;
      popupBg.appendChild(popup);
    }

    // 初始化年月，渲染当月
    let curDate = new Date();
    let curYear = curDate.getFullYear();
    let curMonth = curDate.getMonth() + 1;
    if (curYear < 2026) curYear = 2026;
    if (curYear > 2100) curYear = 2100;
    yearSelect.value = curYear;
    monthSelect.value = curMonth;
    renderCalendar(curYear, curMonth);

    // 切换年月
    yearSelect.onchange = function () {
      renderCalendar(parseInt(yearSelect.value), parseInt(monthSelect.value));
    }
    monthSelect.onchange = function () {
      renderCalendar(parseInt(yearSelect.value), parseInt(monthSelect.value));
    }
    // 今天按钮
    document.getElementById("todayBtn").onclick = function () {
      let now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth() + 1;
      yearSelect.value = y;
      monthSelect.value = m;
      renderCalendar(y, m);
    }
    // 关闭弹窗（点击背景也可以关闭）
    document.getElementById("popupBg").onclick = function (e) {
      if (e.target === this) { this.style.display = "none"; }
    };


    /* --- 芥末泥的新增逻辑：切换与存储 (三房间版) --- */

    // 1. 底部导航栏切换逻辑 (三个按钮)
    function switchTab(tab) {
      ['calendarView', 'writeView', 'memoryView'].forEach(id => document.getElementById(id).classList.remove('active'));
      ['navCalendar', 'navWrite', 'navMemory'].forEach(id => document.getElementById(id).classList.remove('active'));

      if (tab === 'calendar') {
        document.getElementById('calendarView').classList.add('active');
        document.getElementById('navCalendar').classList.add('active');
      } else if (tab === 'write') {
        document.getElementById('writeView').classList.add('active');
        document.getElementById('navWrite').classList.add('active');
      } else if (tab === 'memory') {
        document.getElementById('memoryView').classList.add('active');
        document.getElementById('navMemory').classList.add('active');
        renderSavedLetters(); // 每次进回忆匣都重新加载一遍信件
      }
    }

    // 2. 初始化写信日期为今天
    document.getElementById('letterDate').valueAsDate = new Date();

    // 3. 保存新信件并触发动画
    function saveNewLetter() {
      const date = document.getElementById('letterDate').value;
      const sender = document.getElementById('letterSender').value.trim() || '姐姐';
      const body = document.getElementById('letterBody').value.trim();
      const recipient = document.getElementById('letterRecipient').value.trim() || '小琪';

      if (!body) {
        alert("正文不能是空的哦，不然寄出的是一张白纸啦！");
        return;
      }

      const newLetter = { id: Date.now(), date, sender, body, recipient };
      
      let saved = JSON.parse(localStorage.getItem('mySavedLetters') || '[]');
      saved.push(newLetter);
      
      // ✨ 魔法排序：按日期从新到旧排
      saved.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      localStorage.setItem('mySavedLetters', JSON.stringify(saved));

      // 清空输入框正文
      document.getElementById('letterBody').value = '';
      
      // 触发投递动画！
      playMailAnimation();
    }

    // 4. 播放悬浮小动画
    function playMailAnimation() {
      const overlay = document.getElementById('animOverlay');
      overlay.style.display = 'flex';
      
      // 等待 1.5 秒动画播完，然后藏起动画，自动跳转到“回忆匣”看新信
      setTimeout(() => {
        overlay.style.display = 'none';
        switchTab('memory'); 
      }, 1500);
    }

    // 🌟 记录当前哪封信被抽出来了
    window.expandedLetterId = null; 

    // 5. 渲染回忆匣里的信件 (带堆叠魔法)
    function renderSavedLetters() {
      const listDiv = document.getElementById('savedLettersList');
      listDiv.innerHTML = '';
      let saved = JSON.parse(localStorage.getItem('mySavedLetters') || '[]');

      const keywordInput = document.getElementById('searchKeyword');
      const dateInput = document.getElementById('searchDate');
      const keyword = keywordInput ? keywordInput.value.trim().toLowerCase() : '';
      const filterDate = dateInput ? dateInput.value : '';

      if (keyword) {
        saved = saved.filter(l => l.body.toLowerCase().includes(keyword) || l.sender.toLowerCase().includes(keyword) || l.recipient.toLowerCase().includes(keyword));
      }
      if (filterDate) saved = saved.filter(l => l.date === filterDate);

      if (saved.length === 0) {
        let emptyMsg = (keyword || filterDate) ? '没有找到这封信哦，换个词试试？' : '回忆匣空空的，快去存入第一封信吧～';
        listDiv.innerHTML = `<p style="text-align:center; color:#999; margin-top: 30px;">${emptyMsg}</p>`;
        return;
      }

      saved.forEach((letter, index) => {
        // 默认让第一封信（最新的一封）处于抽出状态，其他的乖乖叠在下面
        let isExpanded = false;
        if (window.expandedLetterId === null && index === 0) {
            isExpanded = true;
            window.expandedLetterId = letter.id;
        } else if (window.expandedLetterId === letter.id) {
            isExpanded = true;
        }

        const card = document.createElement('div');
        // 根据状态赋予不同的魔法 Class
        card.className = isExpanded ? 'letter-card expanded' : 'letter-card stacked';
        card.setAttribute('data-id', letter.id);
        
        // 点击卡片触发抽出动画
        card.onclick = function() { toggleLetter(letter.id); };

        // 重新排版的信件 HTML
        card.innerHTML = `
          <div class="card-header">
             <div class="card-date">🗓️ ${letter.date}</div>
             <button class="delete-btn" onclick="deleteLetter(${letter.id}, event)">×</button>
          </div>
          <div class="card-content-wrapper">
             <div class="card-content">
                <div class="card-sender">From: ${letter.sender}</div>
                <div class="card-body">${letter.body}</div>
                <div class="card-recipient">To: ${letter.recipient}</div>
             </div>
          </div>
        `;
        listDiv.appendChild(card);
      });
    }

    // 🌟 触发抽屉动画的核心函数
    function toggleLetter(id) {
       const cards = document.querySelectorAll('.letter-card');
       cards.forEach(card => {
          const cardId = parseInt(card.getAttribute('data-id'));
          if (cardId === id) {
             // 如果点的是已经抽出的信，就把它塞回去
             if (card.classList.contains('expanded')) {
                card.classList.remove('expanded');
                card.classList.add('stacked');
                window.expandedLetterId = null; 
             } else {
                // 如果点的是叠放的信，就把它平铺抽出
                card.classList.remove('stacked');
                card.classList.add('expanded');
                window.expandedLetterId = id; 
             }
          } else {
             // 其他信件全部自动塞回盒子里叠好
             card.classList.remove('expanded');
             card.classList.add('stacked');
          }
       });
    }

    // 6. 修复删除信件功能 (防止误触抽出动画)
    function deleteLetter(id, event) {
      event.stopPropagation(); // 阻止点击事件冒泡
      if(confirm("确定要把这封珍贵的信从回忆匣里拿走吗？")) {
        let saved = JSON.parse(localStorage.getItem('mySavedLetters') || '[]');
        saved = saved.filter(l => l.id !== id);
        localStorage.setItem('mySavedLetters', JSON.stringify(saved));
        if (window.expandedLetterId === id) window.expandedLetterId = null;
        renderSavedLetters();
      }
    }
    //到这
  </script>
</body>

</html>
